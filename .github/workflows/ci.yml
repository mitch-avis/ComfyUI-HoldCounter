name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

# setup-uv (and many other JS actions) still bundle Node.js 20, which GitHub is
# deprecating. Opt into Node.js 24 now so we don't get the deprecation warning
# and are ready for the June 2nd, 2026 forced switchover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, type check, and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        # setup-uv v8 dropped floating major/minor tags; pin to an immutable tag.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (with dev extras)
        run: uv sync --python ${{ matrix.python-version }} --extra dev || uv pip install
          --python ${{ matrix.python-version }} --system -e ".[dev]"

      - name: ruff format --check
        run: uv tool run ruff format --check .

      - name: ruff check
        run: uv tool run ruff check .

      - name: pyright
        run: uv run --with pyright pyright .

      - name: pytest
        run: uv run --with pytest --with pytest-cov pytest --cov=_impl
          --cov-report=term-missing
