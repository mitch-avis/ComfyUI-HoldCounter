name: Dependabot auto-merge

# Auto-approve and enable auto-merge on Dependabot PRs whose update is minor/patch. Major bumps
# still require manual review. The merge itself is gated by the branch ruleset's required status
# checks (CI must pass).

on: pull_request_target

permissions:
    contents: write
    pull-requests: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Fetch update metadata
              id: meta
              uses: dependabot/fetch-metadata@v3.1.0
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Enable auto-merge for non-major bumps
              if: steps.meta.outputs.update-type != 'version-update:semver-major'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_URL: ${{ github.event.pull_request.html_url }}
              run: gh pr merge --squash --auto "$PR_URL"
